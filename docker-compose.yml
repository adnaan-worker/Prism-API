services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prism-api-backend
    environment:
      DATABASE_URL: postgres://postgres:du_adnaan%40@postgres16:5432/api_aggregator?sslmode=disable
      DB_MAX_OPEN_CONNS: 25
      DB_MAX_IDLE_CONNS: 5
      DB_CONN_MAX_LIFETIME: 5m
      REDIS_URL: redis://:du_adnaan%40@redis7:6379
      REDIS_POOL_SIZE: 10
      REDIS_MIN_IDLE_CONN: 2
      JWT_SECRET: your-secret-key-change-in-production
      PORT: 8080
      SERVER_READ_TIMEOUT: 10s
      SERVER_WRITE_TIMEOUT: 10s
      REQUEST_TIMEOUT: 30s
      EMBEDDING_URL: http://127.0.0.1:8765
      EMBEDDING_TIMEOUT: 3s
      EMBEDDING_ENABLED: "false"
      CACHE_ENABLED: "true"
      CACHE_TTL: 24h
      CACHE_SEMANTIC_MATCH: "false"
      CACHE_THRESHOLD: "0.85"
      REGISTRATION_ENABLED: "true"
      DEFAULT_QUOTA: "10000"
    restart: unless-stopped
    networks:
      - external_network

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: prism-api-portal
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - external_network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: prism-api-admin
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - external_network

networks:
  external_network:
    name: adnaan_network
    external: true
